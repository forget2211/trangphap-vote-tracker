<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Trang Pháp MV Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#fff0f6;
margin:0;
}

.header{
background:#e250189;
color:white;
text-align:center;
padding:20px;
}

.center{
text-align:center;
margin-top:20px;
}

.center img{
width:220px;
border-radius:20px;
box-shadow:0 0 20px #e250189;
}

.container{
width:1100px;
margin:auto;
margin-top:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#e250189;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

.highlight{
background:#ffd6e7;
font-weight:bold;
}

.warning{
background:#fff3cd;
}

</style>

</head>

<body>

<div class="header">

<h1>Trang Pháp Vote Tracker</h1>
<p>Giải Cống Hiến 2026 - Music Video</p>

</div>

<div class="center">

<img src="https://giaithuongconghien2026.bvote.vn/images/gtch2026/2/7.jpg">

<h2>Trang Pháp Monitoring Center</h2>

</div>

<div class="container">

<canvas id="chart"></canvas>

<br>

<table id="ranking">

<thead>

<tr>

<th>Rank</th>
<th>Music Video</th>
<th>Votes</th>
<th>Speed</th>
<th>Money Estimate</th>

</tr>

</thead>

<tbody></tbody>

</table>

</div>

<script src="tracker.js"></script>

</body>

</html>
